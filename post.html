<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Article | Emmilio Valentino Del Grosso</title>
<meta name="description" content="Latest racing updates, announcements and race reports from Emmilio Valentino Del Grosso.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&family=Barlow:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #E8162A;
    --red-dark: #B0101F;
    --black: #0A0A0A;
    --dark: #111111;
    --mid: #1A1A1A;
    --surface: #181818;
    --white: #FFFFFF;
    --off-white: #F2F2F2;
    --muted: rgba(255,255,255,0.58);
    --muted-strong: rgba(255,255,255,0.74);
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.16);
    --success: #42d392;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--black);
    color: var(--white);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }
  a { color: inherit; }
  img { max-width: 100%; }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 5vw;
    height: 66px;
    background: rgba(10,10,10,0.94);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 1.35rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--white);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .nav-logo span { color: var(--red); }
  .nav-links {
    display: flex;
    align-items: center;
    gap: 1.75rem;
    list-style: none;
  }
  .nav-links a {
    font-size: 0.76rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--white); }
  .nav-cta {
    background: var(--red) !important;
    color: var(--white) !important;
    padding: 8px 18px;
    border-radius: 3px;
    font-size: 0.74rem !important;
    letter-spacing: 0.1em;
  }
  .nav-cta:hover { background: var(--red-dark) !important; }

  /* BUTTONS */
  .btn-primary, .btn-outline, .btn-red-outline {
    padding: 13px 28px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border: 0;
  }
  .btn-primary { background: var(--red); color: var(--white); }
  .btn-primary:hover { background: var(--red-dark); transform: translateY(-1px); }
  .btn-outline { background: transparent; color: var(--white); border: 1px solid rgba(255,255,255,0.35); }
  .btn-outline:hover { border-color: var(--white); background: rgba(255,255,255,0.06); transform: translateY(-1px); }
  .btn-red-outline { background: rgba(232,22,42,0.08); color: var(--red); border: 1px solid rgba(232,22,42,0.35); }
  .btn-red-outline:hover { background: rgba(232,22,42,0.18); border-color: rgba(232,22,42,0.65); }

  /* HERO */
  .hero, .subhero {
    position: relative;
    display: flex;
    align-items: center;
    overflow: hidden;
    padding-top: 66px;
  }
  .hero { min-height: 100vh; }
  .subhero { min-height: 56vh; }
  .hero-bg, .subhero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 82% 20%, rgba(232,22,42,0.24), transparent 32%),
      linear-gradient(105deg, rgba(10,10,10,0.97) 0%, rgba(10,10,10,0.77) 48%, rgba(10,10,10,0.34) 100%);
    z-index: 1;
  }
  .hero-img, .subhero-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    filter: saturate(0.88) contrast(1.05);
  }
  .hero-content, .subhero-content {
    position: relative;
    z-index: 2;
    padding: 0 5vw;
    max-width: 790px;
  }
  .subhero-content { padding-top: 5rem; padding-bottom: 4rem; }
  .hero-eyebrow, .section-eyebrow {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.2rem;
  }
  .eyebrow-line, .section-label-line { width: 42px; height: 2px; background: var(--red); }
  .section-label-line { width: 30px; height: 1px; }
  .eyebrow-text, .section-label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--red);
  }
  .hero h1, .subhero h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(3.8rem, 9vw, 7.6rem);
    font-weight: 900;
    line-height: 0.92;
    text-transform: uppercase;
    letter-spacing: -0.012em;
    margin-bottom: 1.35rem;
  }
  .subhero h1 { font-size: clamp(3.5rem, 8vw, 6.6rem); }
  .hero h1 em, .subhero h1 em { font-style: normal; color: var(--red); }
  .hero-sub, .subhero-sub {
    font-size: 1.06rem;
    font-weight: 300;
    color: var(--muted-strong);
    line-height: 1.65;
    max-width: 540px;
    margin-bottom: 2.4rem;
  }
  .hero-actions { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }

  /* STATS BAR */
  .stats-bar { background: var(--red); overflow: hidden; }
  .stats-inner { display: flex; align-items: stretch; max-width: 100%; }
  .stat-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.25rem 1rem;
    border-right: 1px solid rgba(0,0,0,0.16);
    text-align: center;
  }
  .stat-item:last-child { border-right: none; }
  .stat-number {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2.2rem;
    font-weight: 900;
    line-height: 1;
  }
  .stat-label {
    font-size: 0.67rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.78);
    margin-top: 4px;
  }

  /* SECTION COMMONS */
  section { padding: 6rem 5vw; }
  h2.section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(2.45rem, 5vw, 3.9rem);
    font-weight: 900;
    text-transform: uppercase;
    line-height: 0.95;
    letter-spacing: -0.01em;
    margin-bottom: 2rem;
  }
  .lead-text {
    font-size: 1.02rem;
    font-weight: 300;
    color: rgba(255,255,255,0.68);
    line-height: 1.75;
    max-width: 620px;
  }

  /* ABOUT */
  .about-section, .goals-section, .contact-section { background: var(--dark); }
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
  }
  .about-text p, .partners-lead p {
    font-size: 1rem;
    font-weight: 300;
    color: rgba(255,255,255,0.72);
    line-height: 1.75;
    margin-bottom: 1.15rem;
  }
  .heritage-tags {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin: 1.8rem 0;
  }
  .heritage-tag {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border-strong);
    padding: 6px 14px;
    border-radius: 2px;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.74);
  }
  .flag { font-size: 1rem; }
  .about-images {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 10px;
  }
  .about-images img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    display: block;
    filter: saturate(0.9);
    background: var(--mid);
  }
  .about-images img:first-child { grid-column: 1 / -1; height: 320px; }

  /* JOURNEY */
  .journey-section, .gallery-section, .partners-section, .news-section { background: var(--black); }
  .journey-grid { max-width: 920px; margin: 0 auto; }
  .journey-intro { margin-bottom: 3.5rem; }
  .timeline { position: relative; }
  .timeline::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--border);
  }
  .timeline-item { position: relative; padding-left: 2.5rem; padding-bottom: 2.8rem; }
  .timeline-item:last-child { padding-bottom: 0; }
  .timeline-dot {
    position: absolute;
    left: -5px;
    top: 4px;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--red);
    border: 2px solid var(--black);
  }
  .timeline-year {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 0.4rem;
  }
  .timeline-item h3, .goal-card h3, .contact-card h3, .news-card h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.28rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.035em;
    margin-bottom: 0.55rem;
  }
  .timeline-item p, .goal-card p, .news-card p, .contact-card p {
    font-size: 0.93rem;
    font-weight: 300;
    color: rgba(255,255,255,0.62);
    line-height: 1.7;
  }

  /* RESULTS */
  .results-section { background: var(--surface); }
  .results-header, .news-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 3rem;
    flex-wrap: wrap;
    gap: 1rem;
    max-width: 1200px;
    margin-left: auto;
    margin-right: auto;
  }
  .results-grid, .news-grid, .goals-grid, .contact-grid, .partner-logos {
    display: grid;
    gap: 1.5px;
    max-width: 1200px;
    margin: 0 auto;
    background: var(--border);
  }
  .results-grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
  .result-card, .goal-card, .news-card, .contact-card, .partner-tile {
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }
  .result-card { padding: 2rem; }
  .result-card::before, .news-card::before, .contact-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--red);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }
  .result-card:hover::before, .news-card:hover::before, .contact-card:hover::before { transform: scaleX(1); }
  .result-circuit, .news-meta {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.8rem;
  }
  .result-position {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 5rem;
    font-weight: 900;
    line-height: 1;
    color: var(--white);
    margin-bottom: 0.3rem;
  }
  .result-position span { font-size: 2rem; color: var(--red); }
  .result-desc {
    font-size: 0.9rem;
    font-weight: 300;
    color: rgba(255,255,255,0.58);
    line-height: 1.55;
  }
  .result-badge, .news-badge {
    display: inline-block;
    margin-top: 0.9rem;
    background: rgba(232,22,42,0.15);
    border: 1px solid rgba(232,22,42,0.3);
    color: var(--red);
    font-size: 0.68rem;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 2px;
  }

  /* NEWS */
  .news-grid { grid-template-columns: repeat(3, 1fr); }
  .news-card { display: flex; flex-direction: column; min-height: 100%; text-decoration: none; color: var(--white); }
  .news-card-img { width: 100%; aspect-ratio: 16/10; overflow: hidden; background: var(--mid); }
  .news-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; filter: saturate(0.9); transition: transform 0.4s ease, filter 0.4s ease; }
  .news-card:hover img { transform: scale(1.045); filter: saturate(1.05); }
  .news-card-body { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
  .news-card h3 { font-size: 1.45rem; line-height: 1.05; margin-bottom: 0.7rem; }
  .news-card p { flex: 1; }
  .news-actions { max-width: 1200px; margin: 2rem auto 0; display: flex; justify-content: center; }

  /* GALLERY */
  .gallery-section { padding-bottom: 4rem; }
  .gallery-scroll {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .gallery-item { position: relative; overflow: hidden; background: var(--mid); aspect-ratio: 3/4; }
  .gallery-item.wide { grid-column: span 2; aspect-ratio: 16/10; }
  .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease, filter 0.4s ease; filter: saturate(0.85); }
  .gallery-item:hover img { transform: scale(1.04); filter: saturate(1.05); }

  /* GOALS */
  .goals-inner, .partners-inner, .contact-inner, .newsletter-inner { max-width: 1200px; margin: 0 auto; }
  .goals-grid { grid-template-columns: repeat(3, 1fr); margin-top: 3rem; }
  .goal-card { background: var(--dark); padding: 2.2rem 2rem; }
  .goal-icon { font-size: 1.6rem; margin-bottom: 1.2rem; display: block; }

  /* QUOTE */
  .quote-section { background: var(--red); padding: 5rem 5vw; text-align: center; }
  .quote-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    text-transform: uppercase;
    line-height: 1.05;
    letter-spacing: -0.01em;
    max-width: 720px;
    margin: 0 auto 1rem;
  }
  .quote-attr { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.7); }

  /* PARTNERS */
  .partners-lead {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
    align-items: center;
    margin-bottom: 5rem;
  }
  .benefits-list { list-style: none; margin-top: 1.5rem; }
  .benefits-list li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 0.92rem;
    font-weight: 400;
    color: rgba(255,255,255,0.72);
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    line-height: 1.45;
  }
  .benefits-list li:last-child { border-bottom: none; }
  .benefit-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); flex-shrink: 0; margin-top: 8px; }
  .partner-logos { grid-template-columns: repeat(3, 1fr); }
  .partner-tile {
    aspect-ratio: 3/1.4;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    transition: background 0.2s ease;
  }
  .partner-tile:hover { background: var(--mid); }
  .partner-tile img { max-width: 80%; max-height: 50px; object-fit: contain; filter: brightness(0) invert(1); opacity: 0.74; transition: opacity 0.2s; }
  .partner-tile:hover img { opacity: 1; }
  .partner-tile.add-partner {
    background: rgba(232,22,42,0.06);
    border: 1px dashed rgba(232,22,42,0.3);
    cursor: pointer;
    text-decoration: none;
    flex-direction: column;
    gap: 6px;
  }
  .partner-tile.add-partner span { font-size: 0.72rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--red); }
  .add-icon { font-size: 1.5rem !important; opacity: 0.65; }

  /* CONTACT */
  .contact-section { text-align: left; }
  .contact-grid { grid-template-columns: 0.85fr 1.15fr; align-items: stretch; }
  .contact-card { padding: 2rem; background: var(--surface); }
  .contact-card h3 { margin-bottom: 1rem; }
  .contact-card p { margin-bottom: 1.2rem; }
  .contact-mini-list { list-style: none; margin-top: 1.4rem; }
  .contact-mini-list li { padding: 0.8rem 0; border-bottom: 1px solid var(--border); color: rgba(255,255,255,0.72); font-size: 0.94rem; line-height: 1.45; }
  .contact-mini-list li strong { color: var(--white); font-weight: 700; }
  .form-wrap { background: var(--surface); padding: 2rem; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-field { display: flex; flex-direction: column; gap: 0.45rem; }
  .form-field.full { grid-column: 1 / -1; }
  label { font-size: 0.72rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.62); }
  input, textarea, select {
    width: 100%;
    background: rgba(255,255,255,0.045);
    border: 1px solid var(--border-strong);
    color: var(--white);
    padding: 0.95rem 1rem;
    font-family: 'Barlow', sans-serif;
    font-size: 0.95rem;
    outline: none;
    border-radius: 3px;
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  input:focus, textarea:focus, select:focus { border-color: rgba(232,22,42,0.72); background: rgba(255,255,255,0.07); }
  textarea { resize: vertical; min-height: 135px; }
  select option { background: #151515; color: #fff; }
  .form-note { margin-top: 0.9rem; font-size: 0.78rem; color: rgba(255,255,255,0.45); line-height: 1.5; }
  .form-status { margin-top: 1rem; min-height: 1.3rem; font-size: 0.92rem; color: var(--muted-strong); }
  .form-status.success { color: var(--success); }
  .form-status.error { color: #ff6b6b; }
  .form-submit-row { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-top: 1.2rem; }

  /* NEWSLETTER */
  .newsletter-section { background: var(--dark); }
  .newsletter-box {
    background:
      radial-gradient(circle at 85% 10%, rgba(232,22,42,0.25), transparent 34%),
      linear-gradient(135deg, rgba(255,255,255,0.045), rgba(255,255,255,0.02));
    border: 1px solid var(--border-strong);
    padding: 2.2rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    align-items: center;
  }
  .newsletter-form { display: flex; gap: 0.8rem; }
  .newsletter-form input { flex: 1; }

  /* SOCIALS / FOOTER */
  .socials { display: flex; gap: 0.85rem; margin-top: 1.6rem; flex-wrap: wrap; }
  .social-link {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid var(--border-strong);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    text-decoration: none;
    font-size: 1rem;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .social-link:hover { border-color: var(--red); color: var(--white); background: rgba(232,22,42,0.1); }
  footer {
    background: var(--black);
    padding: 2rem 5vw;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .footer-brand { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.1rem; letter-spacing: 0.05em; text-transform: uppercase; }
  .footer-brand span { color: var(--red); }
  .footer-copy { font-size: 0.75rem; color: rgba(255,255,255,0.34); }

  /* ANIMATIONS */
  .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.65s ease, transform 0.65s ease; }
  .reveal.visible { opacity: 1; transform: none; }

  /* MOBILE */
  @media (max-width: 900px) {
    .nav-links { display: none; }
    .about-grid, .partners-lead, .contact-grid, .newsletter-box { grid-template-columns: 1fr; gap: 2.4rem; }
    .goals-grid, .news-grid { grid-template-columns: 1fr; }
    .gallery-scroll { grid-template-columns: repeat(2, 1fr); }
    .gallery-item.wide { grid-column: span 2; }
    .partner-logos { grid-template-columns: repeat(2, 1fr); }
    .stats-inner { flex-wrap: wrap; }
    .stat-item { flex: 0 0 50%; border-right: none; border-bottom: 1px solid rgba(0,0,0,0.15); }
    .newsletter-form { flex-direction: column; }
    section { padding: 4rem 5vw; }
  }
  @media (max-width: 560px) {
    .hero h1 { font-size: clamp(3.1rem, 17vw, 4.7rem); }
    .hero-sub, .subhero-sub { font-size: 0.98rem; }
    .hero-actions { align-items: stretch; }
    .btn-primary, .btn-outline, .btn-red-outline { width: 100%; }

    window.netlifyIdentity.on("init", function(user) {
      var hash = window.location.hash || "";
      if (!user && /(confirmation_token|invite_token|recovery_token|email_change_token)/.test(hash)) {
        window.netlifyIdentity.open();
      }

    <p class="subhero-sub" id="postSummary">Loading the latest racing story.</p>

  <div class="journey-grid" id="postContainer" style="max-width:900px;margin:0 auto;">

<script src="/assets/js/main.js" defer></script>
<script>
(async function() {
  function escapeHtml(value) { return String(value || '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
  function formatDate(dateString) {
    if (!dateString) return '';
    const d = new Date(dateString + 'T00:00:00');
    if (Number.isNaN(d.getTime())) return dateString;
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  }
  const slug = decodeURIComponent(location.pathname.split('/').filter(Boolean).pop() || new URLSearchParams(location.search).get('slug') || '');
  const container = document.getElementById('postContainer');
  try {
    const res = await fetch('/data/news.json', { cache: 'no-store' });
    const data = await res.json();
    const post = (data.posts || []).find(p => p.slug === slug) || (data.posts || [])[0];
    if (!post) throw new Error('No post found');
    document.title = post.title + ' | Emmilio Valentino Del Grosso';
    document.getElementById('postTitle').innerHTML = escapeHtml(post.title).replace(':', ':<br><em>') + (post.title.includes(':') ? '</em>' : '');
    document.getElementById('postSummary').textContent = post.summary || '';
    const paragraphs = String(post.body || '').split(/\n\s*\n/).filter(Boolean).map(p => `<p class="lead-text" style="margin-bottom:1.2rem">${escapeHtml(p)}</p>`).join('');
    container.innerHTML = `
      <div class="section-eyebrow reveal"><div class="section-label-line"></div><span class="section-label">${escapeHtml(post.badge || 'Update')}</span></div>
      <div class="news-meta" style="margin-bottom:1.5rem">${escapeHtml(formatDate(post.date))}${post.read_time ? ' · ' + escapeHtml(post.read_time) : ''}</div>
      <div class="gallery-item wide reveal" style="width:100%;margin-bottom:2rem"><img src="${escapeHtml(post.image)}" alt="${escapeHtml(post.title)}"></div>
      ${paragraphs}
      <br><a href="/news" class="btn-red-outline">Back To News</a>
    `;
  } catch (e) {
    container.innerHTML = '<h2 class="section-title">Article Not Found</h2><p class="lead-text">Go back to the news page and choose another update.</p><br><a href="/news" class="btn-red-outline">Back To News</a>';
  }
})();
</script>
