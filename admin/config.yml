backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Website Settings"
        name: "site"
        file: "data/site.json"
        format: "json"
        fields:
          - {label: "Site Name", name: "site_name", widget: "string"}
          - {label: "Driver Name", name: "driver_name", widget: "string"}
          - {label: "Contact Email", name: "contact_email", widget: "string", required: false}
          - {label: "Instagram URL", name: "instagram", widget: "string", required: false}
          - {label: "YouTube URL", name: "youtube", widget: "string", required: false}
          - {label: "Facebook URL", name: "facebook", widget: "string", required: false}
          - {label: "Google Analytics 4 ID", name: "ga4_id", widget: "string", required: false, hint: "Example: G-XXXXXXXXXX"}
          - {label: "Microsoft Clarity ID", name: "clarity_id", widget: "string", required: false}
          - {label: "Meta Pixel ID", name: "meta_pixel_id", widget: "string", required: false}
          - {label: "Hero Image URL", name: "hero_image", widget: "string", required: false}
          - {label: "Fallback Hero Image URL", name: "fallback_hero_image", widget: "string", required: false}

  - name: "news"
    label: "News / Blog Posts"
    files:
      - label: "News Posts"
        name: "news_posts"
        file: "data/news.json"
        format: "json"
        fields:
          - label: "Posts"
            name: "posts"
            widget: "list"
            summary: "{{fields.title}} — {{fields.date}}"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Slug", name: "slug", widget: "string", hint: "Use lowercase words separated with hyphens. Example: silverstone-race-report"}
              - {label: "Date", name: "date", widget: "date", format: "YYYY-MM-DD"}
              - {label: "Read Time", name: "read_time", widget: "string", required: false, default: "1 min read"}
              - {label: "Badge", name: "badge", widget: "string", required: false}
              - {label: "Summary", name: "summary", widget: "text"}
              - {label: "Image", name: "image", widget: "string", required: false, hint: "Paste a Wix/static image URL or uploaded image path."}
              - {label: "Body", name: "body", widget: "markdown"}
