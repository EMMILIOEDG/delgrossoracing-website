<!doctype html><html><head><meta charset="utf-8"><title>Netlify Form Detection</title></head><body>
<form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/thank-you/">
<input type="hidden" name="form-name" value="contact"><p hidden><label>Bot <input name="bot-field"></label></p>
<input name="name"><input type="email" name="email"><input name="company"><input name="subject"><textarea name="message"></textarea><button type="submit">Send</button>
</form>
<form name="newsletter" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/thank-you/">
<input type="hidden" name="form-name" value="newsletter"><p hidden><label>Bot <input name="bot-field"></label></p>
<input type="email" name="email"><button type="submit">Sign Up</button>
</form>
</body></html>
